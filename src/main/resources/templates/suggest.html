<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Suggest Time</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h2 class="mb-4">Suggest Best Time</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/meetings/suggest}" th:object="${suggestionRequest}" method="post" class="mb-5">
                <div class="mb-3">
                    <label class="form-label">Person A</label>
                    <select class="form-select" th:field="*{usernameA}"
                            th:classappend="${#fields.hasErrors('usernameA')} ? 'is-invalid'">
                        <option value="">Select a person...</option>
                        <option th:each="user : ${users}"
                                th:value="${user.username}"
                                th:text="${user.displayName}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{usernameA}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Person B</label>
                    <select class="form-select" th:field="*{usernameB}"
                            th:classappend="${#fields.hasErrors('usernameB')} ? 'is-invalid'">
                        <option value="">Select a person...</option>
                        <option th:each="user : ${users}"
                                th:value="${user.username}"
                                th:text="${user.displayName}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{usernameB}"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label">From Date</label>
                    <input type="date" class="form-control" th:field="*{fromDate}"
                           th:classappend="${#fields.hasErrors('fromDate')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{fromDate}"></div>
                </div>
                <button type="submit" class="btn btn-info text-white">Find Slots</button>
            </form>

            <div th:if="${slots != null}">
                <h5 class="mb-3">Available Slots</h5>
                <div th:if="${slots.isEmpty()}" class="text-muted">No free slots found in the next 7 days.</div>
                <ul class="list-group" th:unless="${slots.isEmpty()}">
                    <li class="list-group-item d-flex align-items-center gap-2"
                        th:each="slot : ${slots}">
                        <i class="bi bi-check-circle-fill text-success"></i>
                        <span th:text="${#temporals.format(slot[0], 'EEE, MMM d yyyy')}"></span>
                        &nbsp;
                        <strong th:text="${#temporals.format(slot[0], 'HH:mm') + ' – ' + #temporals.format(slot[1], 'HH:mm')}"></strong>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
</body>
</html>
